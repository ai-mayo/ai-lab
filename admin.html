<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Lab - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8f9fa; color:#1a1a2e; padding:20px; }
    .container { max-width:1000px; margin:0 auto; }
    h1 { font-size:1.5rem; margin-bottom:4px; }
    .subtitle { color:#6b7280; font-size:0.85rem; margin-bottom:24px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:10px; margin-bottom:16px; overflow:hidden; }
    .card-header { display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid #f3f4f6; cursor:pointer; }
    .card-header:hover { background:#f9fafb; }
    .card-tag { font-size:0.65rem; font-weight:700; padding:3px 8px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px; }
    .card-tag.dag1 { background:#dbeafe; color:#1e40af; }
    .card-tag.dag2 { background:#fee2e2; color:#991b1b; }
    .card-tag.dag3 { background:#ede9fe; color:#5b21b6; }
    .card-tag.dag4 { background:#d1fae5; color:#065f46; }
    .card-title { font-weight:700; font-size:0.95rem; flex:1; }
    .card-status { font-size:0.7rem; padding:2px 8px; border-radius:10px; font-weight:600; }
    .card-status.active { background:#d1fae5; color:#065f46; }
    .card-status.draft { background:#fef3c7; color:#92400e; }
    .card-arrow { color:#9ca3af; transition:transform 0.2s; }
    .card-arrow.open { transform:rotate(90deg); }
    .card-body { display:none; padding:18px; border-top:1px solid #f3f4f6; }
    .card-body.open { display:block; }
    .section { margin-bottom:16px; }
    .section-label { font-size:0.65rem; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .section-text { font-size:0.85rem; color:#374151; line-height:1.6; }
    .check-list { list-style:none; }
    .check-list li { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid #f9fafb; font-size:0.82rem; }
    .check-list li:last-child { border-bottom:none; }
    .check-badge { font-size:0.6rem; font-weight:700; padding:2px 6px; border-radius:3px; white-space:nowrap; }
    .check-badge.must { background:#fee2e2; color:#991b1b; }
    .check-badge.nice { background:#dbeafe; color:#1e40af; }
    .points { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:#6b7280; margin-left:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    th { text-align:left; padding:8px; background:#f9fafb; color:#6b7280; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e5e7eb; }
    td { padding:8px; border-bottom:1px solid #f3f4f6; }
    .flow-step { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #f9fafb; }
    .flow-num { width:24px; height:24px; border-radius:50%; background:#eff6ff; color:#1e40af; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; flex-shrink:0; }
    .flow-text { font-size:0.82rem; color:#374151; }
    .hint-box { background:#fffbeb; border:1px solid #fde68a; border-radius:6px; padding:10px; font-size:0.8rem; color:#92400e; margin-top:8px; }
    .response-box { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:6px; padding:10px; font-size:0.78rem; color:#166534; margin-top:4px; font-family:'JetBrains Mono',monospace; white-space:pre-wrap; }
    .nav { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .nav a { padding:6px 14px; background:#fff; border:1px solid #e5e7eb; border-radius:6px; font-size:0.78rem; color:#374151; text-decoration:none; font-weight:500; }
    .nav a:hover { border-color:#1e40af; color:#1e40af; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Lab - Admin Panel</h1>
    <p class="subtitle">Overzicht van alle opdrachten, checks en score-criteria. Gemeente Mayostad.</p>

    <div class="nav">
      <a href="index.html">Terug naar game</a>
      <a href="ONTWERP.md">Ontwerpdocument</a>
    </div>

    <div id="admin-content"></div>
  </div>

  <script src="missions.js"></script>
  <script>
    const container = document.getElementById("admin-content");

    // Render all missions
    MISSIONS.forEach((mission, mi) => {
      const card = document.createElement("div");
      card.className = "card";

      const dagNum = mi + 1;
      const tagClass = `dag${Math.min(dagNum, 4)}`;

      let bodyHTML = "";

      // Story intro
      if (mission.storyIntro) {
        bodyHTML += `<div class="section"><div class="section-label">Verhaallijn</div><div class="section-text">${mission.storyIntro}</div></div>`;
      }

      // Tasks
      mission.tasks.forEach((task, ti) => {
        bodyHTML += `<div class="card" style="margin-bottom:12px;border-color:#e5e7eb">
          <div style="padding:12px 16px;background:#f9fafb;border-bottom:1px solid #f3f4f6">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="check-badge must">${task.label}</span>
              <strong style="font-size:0.88rem">${task.title}</strong>
            </div>
            <div style="font-size:0.8rem;color:#6b7280;margin-top:4px">${task.desc}</div>
          </div>
          <div style="padding:14px 16px">`;

        // Interaction details
        const inter = task.interaction;
        bodyHTML += `<div class="section"><div class="section-label">Type interactie</div><div class="section-text"><code>${inter.type}</code>${inter.tool ? ` — Tool: <strong>${inter.tool}</strong>` : ""}</div></div>`;

        // Checks (for free-prompt type)
        if (inter.checks) {
          bodyHTML += `<div class="section"><div class="section-label">Score-criteria (wat wordt gecheckt)</div><table><thead><tr><th>Element</th><th>Keywords</th><th>Hint bij missen</th><th>Punten</th></tr></thead><tbody>`;
          inter.checks.forEach(c => {
            bodyHTML += `<tr><td><strong>${c.label}</strong></td><td><code>${c.keywords.join(", ")}</code></td><td>${c.hint}</td><td>${c.points}</td></tr>`;
          });
          bodyHTML += `</tbody></table></div>`;
        }

        // Responses
        if (inter.responses && typeof inter.responses === "object" && !Array.isArray(inter.responses)) {
          bodyHTML += `<div class="section"><div class="section-label">AI Responses per score</div>`;
          Object.entries(inter.responses).forEach(([key, val]) => {
            const text = typeof val === "string" ? val : val.output || JSON.stringify(val);
            bodyHTML += `<div style="margin-bottom:6px"><span class="check-badge ${key === "perfect" || key === "good" ? "nice" : "must"}">${key}</span><div class="response-box">${text.slice(0, 300)}${text.length > 300 ? "..." : ""}</div></div>`;
          });
          bodyHTML += `</div>`;
        }

        // Scan text items
        if (inter.text && Array.isArray(inter.text)) {
          bodyHTML += `<div class="section"><div class="section-label">Scan-items (verdacht/niet verdacht)</div><ul class="check-list">`;
          inter.text.forEach(t => {
            bodyHTML += `<li><span class="check-badge ${t.suspicious ? "must" : "nice"}">${t.suspicious ? "VERDACHT" : "OK"}</span><span>${t.content.slice(0, 100)}${t.content.length > 100 ? "..." : ""}</span>${t.reason ? `<span class="points">${t.reason.slice(0, 60)}...</span>` : ""}</li>`;
          });
          bodyHTML += `</ul></div>`;
        }

        // Sort items
        if (inter.items && Array.isArray(inter.items) && inter.items[0]?.safe !== undefined) {
          bodyHTML += `<div class="section"><div class="section-label">Veilig/Onveilig items</div><ul class="check-list">`;
          inter.items.forEach(item => {
            bodyHTML += `<li><span class="check-badge ${item.safe ? "nice" : "must"}">${item.safe ? "VEILIG" : "NIET DOEN"}</span><span>${item.text}</span></li>`;
          });
          bodyHTML += `</ul></div>`;
        }

        // Insight
        if (task.insight) {
          bodyHTML += `<div class="hint-box"><strong>Inzicht:</strong> ${task.insight}</div>`;
        }

        bodyHTML += `</div></div>`;
      });

      // Wiki pages summary
      if (mission.tasks[0]?.interaction?.wiki) {
        const wiki = mission.tasks[0].interaction.wiki;
        bodyHTML += `<div class="section"><div class="section-label">MayoWiki pagina's (beschikbaar voor gebruiker)</div><ul class="check-list">`;
        Object.entries(wiki.pages).forEach(([key, page]) => {
          bodyHTML += `<li><strong>${page.title}</strong> <span class="points">${page.content.length} blokken</span></li>`;
        });
        bodyHTML += `</ul></div>`;
      }

      card.innerHTML = `
        <div class="card-header" onclick="this.querySelector('.card-arrow').classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
          <span class="card-tag ${tagClass}">Dag ${dagNum}</span>
          <span class="card-title">${mission.name}</span>
          <span class="card-status active">${mission.tasks.length} opdrachten</span>
          <span class="card-arrow">&#9654;</span>
        </div>
        <div class="card-body">${bodyHTML}</div>
      `;
      container.appendChild(card);
    });

    // Board tasks
    const boardCard = document.createElement("div");
    boardCard.className = "card";
    boardCard.innerHTML = `
      <div class="card-header" onclick="this.querySelector('.card-arrow').classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span class="card-tag dag1" style="background:#ddd;color:#666">BOARD</span>
        <span class="card-title">MayoBoard taken</span>
        <span class="card-status draft">Kanban</span>
        <span class="card-arrow">&#9654;</span>
      </div>
      <div class="card-body">
        <div class="section-label">Taken op het bord</div>
        <table>
          <thead><tr><th>ID</th><th>Titel</th><th>Kolom</th><th>Prioriteit</th><th>Actie</th></tr></thead>
          <tbody>
            <tr><td>VTH-040</td><td>MayoWiki doorlezen</td><td>In uitvoering</td><td>Onboarding</td><td>-</td></tr>
            <tr><td>VTH-041</td><td>WiWa bekijken</td><td>In uitvoering</td><td>Onboarding</td><td>-</td></tr>
            <tr><td>VTH-042</td><td>Brief terrasvergunning</td><td>Te doen (verschijnt na 12s)</td><td>Urgent</td><td>Open ChatGPT</td></tr>
          </tbody>
        </table>
      </div>
    `;
    container.appendChild(boardCard);
  </script>
</body>
</html>
