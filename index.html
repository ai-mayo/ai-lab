<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Lab — Leer AI door te doen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Mobile blocker -->
  <div class="mobile-blocker">
    <div class="mobile-blocker-icon">&#128187;</div>
    <div class="mobile-blocker-title">Open dit op een laptop</div>
    <div class="mobile-blocker-text">Deze AI-training simuleert een echte werkplek en werkt het beste op een laptop of desktop computer. Open de link op je computer om te beginnen.</div>
  </div>

  <!-- Boot sequence -->
  <div id="boot-screen">
    <div class="boot-container">
      <div class="boot-logo">
        <svg viewBox="0 0 120 120" width="80" height="80">
          <circle cx="60" cy="60" r="55" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
          <circle cx="60" cy="60" r="40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2">
            <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="8s" repeatCount="indefinite"/>
          </circle>
          <circle cx="60" cy="60" r="25" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="4 8" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="60" cy="60" r="8" fill="#00d4ff" opacity="0.8">
            <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
      <div class="boot-text" id="boot-text"></div>
      <div class="boot-progress">
        <div class="boot-progress-fill" id="boot-progress-fill"></div>
      </div>
      <div class="boot-status" id="boot-status">INITIALISEREN...</div>
    </div>
  </div>

  <!-- macOS Login Screen -->
  <div id="login-screen" class="hidden">
    <div class="login-time" id="login-time"></div>
    <div class="login-date" id="login-date"></div>
    <div class="login-avatar" id="login-avatar"></div>
    <div class="login-name" id="login-name-display"></div>
    <div class="login-input-wrap">
      <input type="password" class="login-input" id="login-password" placeholder="Wachtwoord">
      <button class="login-arrow" id="login-go">&rarr;</button>
    </div>
    <div class="login-hint">Klik op de pijl of druk Enter</div>
  </div>

  <div id="app" style="display:none">
    <div class="scanlines"></div>

    <!-- Header -->
    <header class="header" id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-bracket">[</span>AI<span class="logo-dot">.</span>LAB<span class="logo-bracket">]</span>
        </div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span class="status-text">SYSTEEM ACTIEF</span>
        </div>
      </div>
      <div class="header-right">
        <div class="xp-chip" id="xp-chip">
          <span class="xp-icon">&#9889;</span>
          <span class="xp-value" id="header-xp">0</span>
          <span class="xp-label">XP</span>
        </div>
        <div class="streak-chip" id="streak-chip">
          <span class="streak-icon">&#128293;</span>
          <span class="streak-value" id="header-streak">0</span>
        </div>
      </div>
    </header>

    <!-- Story Screen (replaces home + mission screens) -->
    <div id="story-screen" class="screen active">
      <div id="story-content"></div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-container" id="result-container"></div>
    </div>

    <div class="xp-toast" id="xp-toast"></div>
    <button class="sound-btn" id="sound-btn" title="Geluid">&#128266;</button>
  </div>

  <script src="missions.js"></script>
  <script src="apps.js"></script>
  <script src="engine.js"></script>
</body>
</html>
