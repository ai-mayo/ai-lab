<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Lab — Leer AI door te doen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Scanlines overlay -->
    <div class="scanlines"></div>

    <!-- Header -->
    <header class="header" id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-bracket">[</span>AI<span class="logo-dot">.</span>LAB<span class="logo-bracket">]</span>
        </div>
      </div>
      <div class="header-right">
        <div class="xp-chip" id="xp-chip">
          <span class="xp-icon">&#9889;</span>
          <span class="xp-value" id="header-xp">0</span>
          <span class="xp-label">XP</span>
        </div>
        <div class="streak-chip" id="streak-chip">
          <span class="streak-icon">&#128293;</span>
          <span class="streak-value" id="header-streak">0</span>
        </div>
      </div>
    </header>

    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
      <div class="hero">
        <div class="hero-glow"></div>
        <div class="hero-terminal">
          <div class="terminal-bar">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title">ai.lab — terminal</span>
          </div>
          <div class="terminal-body" id="hero-terminal-body">
            <div class="terminal-line"><span class="terminal-prompt">$</span> <span class="typing" id="hero-typing"></span><span class="cursor">|</span></div>
          </div>
        </div>
        <h1 class="hero-title">Leer AI door te <span class="highlight">doen</span></h1>
        <p class="hero-sub">Geen theorie. Geen quizjes. Echte opdrachten.</p>
      </div>

      <div class="missions-grid" id="missions-grid"></div>

      <div class="daily-challenge" id="daily-challenge">
        <div class="daily-header">
          <span class="daily-icon">&#128225;</span>
          <span class="daily-label">DAGELIJKSE OPDRACHT</span>
          <span class="daily-timer" id="daily-timer"></span>
        </div>
        <div class="daily-body" id="daily-body"></div>
      </div>
    </div>

    <!-- Mission Screen -->
    <div id="mission-screen" class="screen">
      <div class="mission-header">
        <button class="back-btn" id="mission-back">&larr; Terug</button>
        <div class="mission-progress">
          <div class="mission-progress-bar"><div class="mission-progress-fill" id="mission-progress-fill"></div></div>
          <span class="mission-step" id="mission-step">1/5</span>
        </div>
      </div>
      <div class="mission-content" id="mission-content"></div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
      <div class="result-container" id="result-container"></div>
    </div>

    <!-- XP Popup -->
    <div class="xp-toast" id="xp-toast"></div>

    <!-- Sound toggle -->
    <button class="sound-btn" id="sound-btn" title="Geluid">&#128266;</button>
  </div>

  <script src="missions.js"></script>
  <script src="engine.js"></script>
</body>
</html>
